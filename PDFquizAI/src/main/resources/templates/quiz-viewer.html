<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator | Configuration & Processing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --saffron: #FF9933; --green: #138808; --navy: #000080; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: var(--navy); }
        .border-navy { border: 2px solid var(--navy); }
        .neo-shadow { box-shadow: 4px 4px 0px 0px var(--navy); }
        .neo-shadow-sm { box-shadow: 2px 2px 0px 0px var(--navy); }

        /* Custom Scrollbar for Sidebar */
        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: var(--navy);
            border-radius: 10px;
        }

        /* Stage Visibility */
        #ai-loader, #quiz-content { display: none; }

        /* Custom Radio/Check Styling */
        input[type="radio"]:checked + span,
        input[type="checkbox"]:checked + .check-box {
            background-color: var(--saffron);
            color: white;
            border-color: var(--navy);
        }

        /* =========================
   FULL RESPONSIVE FIX
   ========================= */

/* Mobile */
@media (max-width: 640px) {

    body {
        overflow: auto !important;
        height: auto !important;
    }

    /* MAIN LAYOUT → STACK */
    main {
        flex-direction: column !important;
        height: auto !important;
    }

    /* LEFT SIDEBAR */
    aside {
        width: 100% !important;
        height: auto !important;
        border-right: none !important;
        border-bottom: 2px solid var(--navy);
    }

    /* RIGHT SECTION */
    section {
        width: 100% !important;
        height: auto !important;
    }

    /* HEADER NAV */
    nav {
        flex-direction: column !important;
        gap: 10px !important;
        text-align: center;
    }

    nav .flex {
        justify-content: center !important;
        flex-wrap: wrap;
    }

    /* PROFILE GRID */
    aside .grid {
        grid-template-columns: 1fr !important;
    }

    /* PDF PREVIEW */
    iframe {
        height: 220px !important;
    }

    /* TITLE */
    h2 {
        font-size: 1.8rem !important;
    }

    /* CRITERIA SECTION */
    #criteria-section {
        padding: 20px !important;
    }

    /* DIFFICULTY BUTTONS STACK */
    .flex.gap-6 {
        flex-direction: column !important;
    }

    /* LEVEL GRID → 2 COL */
    .grid.grid-cols-3 {
        grid-template-columns: repeat(2, 1fr) !important;
    }

    /* CATEGORY GRID → 1 COL */
    .grid.grid-cols-2 {
        grid-template-columns: 1fr !important;
    }

    /* BIG BUTTON */
    button {
        font-size: 1rem !important;
        padding: 14px !important;
    }
}

/* Tablets */
@media (min-width: 641px) and (max-width: 1024px) {

    main {
        flex-direction: column !important;
    }

    aside {
        width: 100% !important;
        border-right: none !important;
        border-bottom: 2px solid var(--navy);
    }

    section {
        width: 100% !important;
    }

    /* LEVEL GRID → 3 COL OK BUT TIGHT */
    .grid.grid-cols-3 {
        grid-template-columns: repeat(3, 1fr) !important;
        gap: 10px !important;
    }

    /* CATEGORY GRID → 2 COL */
    .grid.grid-cols-2 {
        grid-template-columns: repeat(2, 1fr) !important;
    }

    iframe {
        height: 320px !important;
    }

    #criteria-section {
        padding: 40px !important;
    }
}

/* Safety overflow fix */
img, iframe {
    max-width: 100%;
}
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

<!-- Header / Nav -->
<nav class="border-b-2 border-navy bg-white px-6 py-4 flex justify-between items-center z-30 shrink-0">
    <div class="flex items-center gap-2">
        <i data-lucide="brain-circuit" class="w-6 h-6 text-navy"></i>
        <span class="font-black text-xl tracking-tight">Pdf-To-Quiz <span class="text-saffron">AI</span></span>
    </div>
    <div class="flex items-center gap-4">
        <span class="text-[10px] font-black bg-green-100 text-green-700 px-3 py-1.5 rounded-full border-2 border-green-200 uppercase tracking-wider">AI Engine: Gemini Pro</span>
        <button class="bg-navy text-white p-2.5 rounded-xl border-2 border-navy hover:bg-opacity-90 transition-all">
            <i data-lucide="user" class="w-5 h-5"></i>
        </button>
    </div>
</nav>

<!-- Main Layout -->
<main class="flex-1 flex overflow-hidden">

    <!-- LEFT SECTION (30%) - PDF & TOOLS -->
    <aside class="w-[30%] border-r-2 border-navy bg-white flex flex-col h-full overflow-y-auto custom-scroll shrink-0">

        <!-- Profile Header -->
        <div class="p-6 border-b-2 border-navy bg-gray-50/50">
            <div class="flex items-center gap-4 mb-6">
                <img th:src="${picture}"
                     src="https://api.dicebear.com/7.x/avataaars/svg?seed=John"
                     class="w-12 h-12 rounded-full border-navy border-2 neo-shadow-sm bg-white"
                     alt="Profile">
                <div>
                    <p class="text-base font-black leading-none mb-1" th:text="${name}">John Doe</p>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest" th:text="${email}">premium student</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white border-2 border-navy p-3 rounded-xl text-center neo-shadow-sm">
                    <p class="text-[9px] font-black text-gray-400 uppercase mb-1">STREAK</p>
                    <p class="font-black text-lg">12 Days</p>
                </div>
                <div class="bg-white border-2 border-navy p-3 rounded-xl text-center neo-shadow-sm">
                    <p class="text-[9px] font-black text-gray-400 uppercase mb-1">QUIZZES</p>
                    <p class="font-black text-lg">45</p>
                </div>
            </div>
        </div>

        <!-- PDF Section -->
        <div class="p-6">
            <h3 class="text-[11px] font-black uppercase tracking-widest mb-4 flex items-center gap-2">
                <i data-lucide="file-text" class="w-4 h-4 text-saffron"></i> Current Document
            </h3>
            <!-- DESKTOP / TABLET PDF VIEW -->
            <div class="hidden sm:block rounded-2xl border-2 border-navy overflow-hidden bg-gray-200 aspect-[3/4] neo-shadow relative mb-8">
                <iframe th:src="${filePath}" class="w-full h-full"></iframe>
            </div>

            <!-- MOBILE PDF ACTION BUTTON -->
            <div class="sm:hidden mb-8">
                <a th:href="${filePath}" target="_blank"
                   class="w-full flex items-center justify-center gap-3 bg-[#000080] text-white font-black py-4 rounded-2xl border-2 border-black neo-shadow">

                    <i data-lucide="external-link" class="w-5 h-5"></i>
                    Open PDF Full Screen
                </a>

                <p class="text-[10px] text-gray-400 mt-2 text-center font-bold">
                    PDF opens in a separate viewer for better mobile experience
                </p>
            </div>

            <!-- Study Tools -->
            <h3 class="text-[11px] font-black uppercase tracking-widest mb-4">Study Tools</h3>
            <div class="grid grid-cols-2 gap-4 pb-6">
                <button class="flex flex-col items-center p-4 border-2 border-navy rounded-2xl hover:bg-orange-50 transition-all neo-shadow-sm group">
                    <i data-lucide="highlighter" class="w-6 h-6 mb-2 text-saffron group-hover:scale-110 transition-transform"></i>
                    <span class="text-[11px] font-black uppercase">Highlights</span>
                </button>
                <button class="flex flex-col items-center p-4 border-2 border-navy rounded-2xl hover:bg-blue-50 transition-all neo-shadow-sm group">
                    <i data-lucide="sticky-note" class="w-6 h-6 mb-2 text-blue-500 group-hover:scale-110 transition-transform"></i>
                    <span class="text-[11px] font-black uppercase">Notes</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- RIGHT SECTION (70%) -->
    <section class="flex-1 relative flex flex-col bg-white overflow-y-auto custom-scroll">

        <!-- STAGE 1: CRITERIA SELECTION -->
        <div id="criteria-section" class="p-12 max-w-4xl mx-auto w-full">

            <div class="mb-12 text-center">
                <h2 class="text-5xl font-black text-navy mb-4 tracking-tight">
                    Configure Your <span class="text-saffron">Quiz</span>
                </h2>
                <p class="text-gray-500 font-bold text-lg">
                    Customize how AI generates questions from your PDF.
                </p>
            </div>

            <div class="space-y-12">

                <!-- 1. Difficulty -->
                <div>
                    <label class="block text-[11px] font-black uppercase tracking-widest text-gray-400 mb-5">
                        1. Select Difficulty
                    </label>
                    <div class="flex gap-6">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="difficulty" value="Easy" class="hidden" checked>
                            <span class="block text-center py-5 border-2 border-navy rounded-2xl font-black text-lg neo-shadow-sm hover:bg-orange-50 transition-all">Easy</span>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="difficulty" value="Medium" class="hidden">
                            <span class="block text-center py-5 border-2 border-navy rounded-2xl font-black text-lg neo-shadow-sm hover:bg-orange-50 transition-all">Medium</span>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="difficulty" value="Hard" class="hidden">
                            <span class="block text-center py-5 border-2 border-navy rounded-2xl font-black text-lg neo-shadow-sm hover:bg-orange-50 transition-all">Hard</span>
                        </label>
                    </div>
                </div>

                <!-- 2. Exam Level -->
                <div>
                    <label class="block text-[11px] font-black uppercase tracking-widest text-gray-400 mb-5">
                        2. Study Standard / Exam Level
                    </label>
                    <div class="grid grid-cols-3 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="level" value="HS Level" class="hidden" checked>
                            <span class="block text-center py-4 border-2 border-navy rounded-xl font-bold text-sm hover:bg-gray-50 transition-all">HS Level</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="level" value="Graduation" class="hidden">
                            <span class="block text-center py-4 border-2 border-navy rounded-xl font-bold text-sm hover:bg-gray-50 transition-all">Graduation</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="level" value="GATE" class="hidden">
                            <span class="block text-center py-4 border-2 border-navy rounded-xl font-bold text-sm hover:bg-gray-50 transition-all">GATE</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="level" value="JEE / NEET" class="hidden">
                            <span class="block text-center py-4 border-2 border-navy rounded-xl font-bold text-sm hover:bg-gray-50 transition-all">JEE / NEET</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="level" value="UPSC / Govt" class="hidden">
                            <span class="block text-center py-4 border-2 border-navy rounded-xl font-bold text-sm hover:bg-gray-50 transition-all">UPSC / Govt</span>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="level" value="Placement" class="hidden">
                            <span class="block text-center py-4 border-2 border-navy rounded-xl font-bold text-sm hover:bg-gray-50 transition-all">Placement</span>
                        </label>
                    </div>
                </div>

                <!-- 3. Categories -->
                <div>
                    <label class="block text-[11px] font-black uppercase tracking-widest text-gray-400 mb-5">
                        3. Question Categories
                    </label>
                    <div class="grid grid-cols-2 gap-6">
                        <label class="relative flex items-center p-5 border-2 border-navy rounded-2xl cursor-pointer hover:bg-green-50 transition-all">
                            <input type="checkbox" name="categories" value="Multiple Choice (MCQs)" class="hidden" checked>
                            <div class="check-box w-6 h-6 border-2 border-navy rounded mr-4 flex items-center justify-center transition-colors">
                                <i data-lucide="check" class="w-4 h-4 text-white"></i>
                            </div>
                            <span class="font-black text-sm">Multiple Choice (MCQs)</span>
                        </label>

                        <label class="relative flex items-center p-5 border-2 border-navy rounded-2xl cursor-pointer hover:bg-green-50 transition-all">
                            <input type="checkbox" name="categories" value="True / False" class="hidden">
                            <div class="check-box w-6 h-6 border-2 border-navy rounded mr-4 flex items-center justify-center transition-colors">
                                <i data-lucide="check" class="w-4 h-4 text-white"></i>
                            </div>
                            <span class="font-black text-sm">True / False</span>
                        </label>

                        <label class="relative flex items-center p-5 border-2 border-navy rounded-2xl cursor-pointer hover:bg-green-50 transition-all">
                            <input type="checkbox" name="categories" value="Conceptual Questions" class="hidden">
                            <div class="check-box w-6 h-6 border-2 border-navy rounded mr-4 flex items-center justify-center transition-colors">
                                <i data-lucide="check" class="w-4 h-4 text-white"></i>
                            </div>
                            <span class="font-black text-sm">Conceptual Questions</span>
                        </label>

                        <label class="relative flex items-center p-5 border-2 border-navy rounded-2xl cursor-pointer hover:bg-green-50 transition-all">
                            <input type="checkbox" name="categories" value="Numerical / Practical" class="hidden">
                            <div class="check-box w-6 h-6 border-2 border-navy rounded mr-4 flex items-center justify-center transition-colors">
                                <i data-lucide="check" class="w-4 h-4 text-white"></i>
                            </div>
                            <span class="font-black text-sm">Numerical / Practical</span>
                        </label>
                    </div>
                </div>

                <!-- Generate Button -->
                <button onclick="startGeneration()"
                        class="w-full bg-green-600 text-white py-6 rounded-2xl font-black text-2xl border-2 border-navy neo-shadow flex items-center justify-center gap-4 hover:-translate-y-1 hover:bg-green-700 transition-all mb-10">
                    <i data-lucide="zap" class="w-8 h-8 fill-saffron text-saffron"></i>
                    Start AI Generation
                </button>

            </div>
        </div>
    </section>
</main>

<script>
    lucide.createIcons();

    function startGeneration() {
        const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
        const level = document.querySelector('input[name="level"]:checked').value;
        const categories = [];
        document.querySelectorAll('input[name="categories"]:checked').forEach((item) => {
            categories.push(item.value);
        });

        const currentFile = new URLSearchParams(window.location.search).get("file");

        const form = document.createElement("form");
        form.method = "GET";
        form.action = "/room-types";

        const addInput = (name, value) => {
            const input = document.createElement("input");
            input.type = "hidden";
            input.name = name;
            input.value = value;
            form.appendChild(input);
        };

        addInput("difficulty", difficulty);
        addInput("level", level);
        addInput("file", currentFile);
        categories.forEach(cat => addInput("categories", cat));

        document.body.appendChild(form);
        form.submit();
    }
</script>
</body>
</html>
