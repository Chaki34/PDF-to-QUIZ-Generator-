<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Join the Revolution | Pdf-To-Quiz AI</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <!-- Model Viewer Component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        :root {
            --saffron: #FF9933;
            --green: #138808;
            --navy: #000080;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f7;
            color: var(--navy);
            background-image: radial-gradient(var(--navy) 0.7px, transparent 0.7px);
            background-size: 26px 26px;
            overflow-x: hidden;
        }

        /* THREE.JS BACKGROUND */
        #three-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* NEO-BRUTALISM UI STYLES */
        .border-navy { border: 4px solid var(--navy); }
        .neo-shadow { box-shadow: 10px 10px 0px 0px var(--navy); }

        .input-neo {
            width: 100%;
            padding: 1rem;
            border: 4px solid var(--navy);
            font-weight: 700;
            color: var(--navy);
            outline: none;
            transition: all 0.2s ease;
            background-color: white;
            box-shadow: 4px 4px 0px 0px var(--navy);
        }
        .input-neo:focus {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px 0px var(--saffron);
        }

        .btn-saffron {
            background-color: var(--saffron);
            color: white;
            border: 4px solid var(--navy);
            box-shadow: 8px 8px 0px 0px var(--navy);
            font-weight: 900;
            text-transform: uppercase;
            padding: 1rem 2rem;
            transition: all 0.15s ease;
            cursor: pointer;
            width: 100%;
        }
        .btn-saffron:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0px 0px var(--navy);
        }

        /* MODEL CONTAINER */
        #item-container {
            width: 100%;
            height: 400px;
            background: white;
            border-bottom: 4px solid var(--navy);
            position: relative;
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        .instructor-panel {
            background: var(--navy);
            padding: 1.5rem;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #ai-bubble {
            transition: all 0.3s ease;
        }

        @media (max-width: 1024px) { #item-container { height: 320px; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<!-- Three.js Background -->
<canvas id="three-bg"></canvas>

<div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2 bg-white/95 backdrop-blur-sm border-navy border-4 neo-shadow rounded-[40px] overflow-hidden relative z-10">

    <!-- LEFT COLUMN: 3D MODEL VIEW -->
    <div class="relative flex flex-col border-r-0 lg:border-r-4 border-navy">
        <div id="item-container">
            <model-viewer id="ai-robot"
                          src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"
                          alt="AI Instructor Robot"
                          animation-name="Walking"
                          autoplay
                          shadow-intensity="1"
                          camera-controls
                          touch-action="pan-y"
                          camera-orbit="0deg 75deg 105%"
                          disable-zoom>
            </model-viewer>
        </div>

        <div class="instructor-panel">
            <div class="inline-block bg-saffron text-white px-2 py-0.5 text-[10px] font-black uppercase tracking-wider w-max mb-2">
                Live Assistant
            </div>
            <h2 id="ai-bubble" class="text-white text-xl md:text-2xl font-bold leading-tight italic">
                "Namaste! <br> I am your AI Instructor."
            </h2>
        </div>
    </div>

    <!-- RIGHT COLUMN: AUTH FORM -->
    <div class="p-8 md:p-12 bg-white">
        <div class="flex items-center gap-3 mb-8">
            <i data-lucide="brain-circuit" class="w-10 h-10 text-navy"></i>
            <span class="font-black text-2xl uppercase tracking-tighter">Pdf-To-Quiz <span class="text-saffron">AI</span></span>
        </div>

        <!-- TABS -->
        <div class="flex gap-6 mb-8 border-b-4 border-gray-100">
            <button onclick="toggleMode('register')" id="tab-reg" class="pb-2 text-sm font-black uppercase border-b-4 border-saffron text-navy transition-all">Register</button>
            <button onclick="toggleMode('login')" id="tab-log" class="pb-2 text-sm font-black uppercase border-b-4 border-transparent text-gray-400 transition-all">Login</button>
        </div>

        <form onsubmit="handleFormSubmit(event); return false;">
            <div id="name-field" class="mb-4">
                <label class="block font-black uppercase text-[10px] mb-1">Full Name</label>
                <input type="text" id="fullNameInput" placeholder="Enter your name" class="input-neo"
                       onfocus="instructorAction('name')" onblur="instructorAction('idle')">
            </div>

            <div class="mb-4">
                <label class="block font-black uppercase text-[10px] mb-1">Email Address</label>
                <input type="email" id="emailInput" placeholder="hello@example.com" class="input-neo"
                       onfocus="instructorAction('email')" onblur="instructorAction('idle')">
            </div>

            <div class="mb-6">
                <label class="block font-black uppercase text-[10px] mb-1">Password</label>
                <input type="password" id="passwordInput" placeholder="••••••••" class="input-neo"
                       onfocus="instructorAction('password')" onblur="instructorAction('idle')">
            </div>

            <button type="submit" id="submit-btn" class="btn-saffron text-lg flex items-center justify-center gap-2">
                <i data-lucide="sparkles" class="w-5 h-5"></i> Create Account
            </button>
        </form>

        <div class="mt-8 pt-6 border-t-2 border-gray-100 flex justify-between items-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Safe & Secure 🛡️</p>
            <div class="flex gap-4">
                <i data-lucide="shield-check" class="w-5 h-5 text-green"></i>
                <i data-lucide="lock" class="w-5 h-5 text-navy"></i>
            </div>
        </div>
    </div>
</div>

<script>
    // --- THREE.JS BACKGROUND LOGIC ---
    const canvas = document.querySelector('#three-bg');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 8;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-10, -10);
    const docItems = [];
    const docFormats = [
        { label: 'PDF', color: '#FF3333' },
        { label: 'DOCX', color: '#000080' },
        { label: 'TXT', color: '#138808' },
        { label: 'PPTX', color: '#FF9933' }
    ];

    function createDocTexture(label, color) {
        const size = 256;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.strokeStyle = '#000080';
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(40, 20); ctx.lineTo(160, 20); ctx.lineTo(210, 70);
        ctx.lineTo(210, 230); ctx.lineTo(40, 230); ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(160, 20); ctx.lineTo(210, 70); ctx.lineTo(160, 70); ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#000080';
        ctx.font = 'bold 50px Inter, Arial';
        ctx.textAlign = 'center';
        ctx.fillText(label, size/2, 160);
        return new THREE.CanvasTexture(canvas);
    }

    function addIcon() {
        const format = docFormats[Math.floor(Math.random() * docFormats.length)];
        const texture = createDocTexture(format.label, format.color);
        const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.2, color: 0xffffff });
        const sprite = new THREE.Sprite(material);
        sprite.position.set((Math.random()-0.5)*25, (Math.random()-0.5)*20, (Math.random()-0.5)*10);
        const baseScale = 1.1 + Math.random();
        sprite.scale.set(baseScale, baseScale, 1);
        sprite.userData = {
            baseScale: baseScale,
            brandColor: new THREE.Color(format.color),
            velocity: new THREE.Vector3((Math.random()-0.5)*0.005, (Math.random()-0.5)*0.005, 0)
        };
        scene.add(sprite);
        docItems.push(sprite);
    }

    for (let i = 0; i < 20; i++) addIcon();

    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(docItems);
        const hoveredObject = intersects.length > 0 ? intersects[0].object : null;

        docItems.forEach((s, i) => {
            s.position.add(s.userData.velocity);
            s.position.y += Math.sin(time + i) * 0.002;
            if (s === hoveredObject) {
                s.material.opacity = THREE.MathUtils.lerp(s.material.opacity, 0.9, 0.1);
                s.material.color.lerp(s.userData.brandColor, 0.1);
                const tScale = s.userData.baseScale * 1.5;
                s.scale.lerp(new THREE.Vector3(tScale, tScale, 1), 0.1);
            } else {
                s.material.opacity = THREE.MathUtils.lerp(s.material.opacity, 0.2, 0.05);
                s.material.color.lerp(new THREE.Color(0xffffff), 0.05);
                s.scale.lerp(new THREE.Vector3(s.userData.baseScale, s.userData.baseScale, 1), 0.05);
            }
            if (s.position.x > 15) s.position.x = -15;
            if (s.position.x < -15) s.position.x = 15;
            if (s.position.y > 10) s.position.y = -10;
            if (s.position.y < -10) s.position.y = 10;
        });
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    animate();

    // --- ORIGINAL ROBOT & FORM LOGIC ---
    const robot = document.getElementById('ai-robot');
    const bubble = document.getElementById('ai-bubble');

    window.instructorAction = (action) => {
        if (!robot) return;
        switch(action) {
            case 'name':
                robot.animationName = "Dance";
                bubble.innerHTML = '"What a wonderful name! <br> Glad to meet you."';
                break;
            case 'email':
                robot.animationName = "Walking";
                bubble.innerHTML = '"I will send your <br> quiz results here."';
                break;
            case 'password':
                robot.animationName = "Death";
                bubble.innerHTML = '"Don\'t worry, <br> I\'m not looking!"';
                break;
            case 'success':
                robot.animationName = "Jump";
                bubble.innerHTML = '"Success! <br> Let\'s get started."';
                break;
            case 'idle':
            default:
                robot.animationName = "Walking";
                bubble.innerHTML = '"Namaste! <br> I am your AI Instructor."';
                break;
        }
    };

    window.toggleMode = (mode) => {
        const isReg = mode === 'register';
        document.getElementById('name-field').style.display = isReg ? 'block' : 'none';
        document.getElementById('tab-reg').className = isReg ? 'pb-2 text-sm font-black uppercase border-b-4 border-saffron text-navy' : 'pb-2 text-sm font-black uppercase border-b-4 border-transparent text-gray-400';
        document.getElementById('tab-log').className = !isReg ? 'pb-2 text-sm font-black uppercase border-b-4 border-saffron text-navy' : 'pb-2 text-sm font-black uppercase border-b-4 border-transparent text-gray-400';
        document.getElementById('submit-btn').innerHTML = isReg ? '<i data-lucide="sparkles" class="w-5 h-5"></i> Create Account' : '<i data-lucide="log-in" class="w-5 h-5"></i> Welcome Back';
        lucide.createIcons();
    };

    window.handleFormSubmit = (e) => {
        e.preventDefault();
        instructorAction('success');
        setTimeout(() => alert("Redirecting to Dashboard..."), 1000);
    };

    lucide.createIcons();
</script>
</body>
</html>
